<div
  class="loader"
  [class.loader--overlay]="overlay()"
  [class.loader--fullscreen]="fullscreen()"
  [class.loader--sm]="size() === 'sm'"
  [class.loader--md]="size() === 'md'"
  [class.loader--lg]="size() === 'lg'"
>
  <div class="loader__spinner"></div>
  @if (label()) {
    <p class="loader__label">{{ label() }}</p>
  }
</div>
