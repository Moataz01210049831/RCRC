<!-- Upload trigger row -->
<div class="fu__row" (click)="openModal()">
  <span class="fu__placeholder">Upload</span>
  <button class="fu__add-btn" type="button">
    <span class="material-icons">add</span>
  </button>
</div>
<p class="fu__hint">{{ hint() }}</p>

<!-- Uploaded files list -->
@for (file of uploadedFiles(); track $index) {
  <div class="fu__file-row">
    <span class="material-icons fu__file-icon">description</span>
    <span class="fu__file-name">{{ file.name }}</span>
    <button class="fu__file-remove" type="button" (click)="removeFile($index)">
      <span class="material-icons">remove_circle_outline</span>
    </button>
  </div>
  <p class="fu__file-meta">{{ file.type }} · {{ file.size }}</p>
}

<!-- Modal -->
@if (modalOpen()) {
  <div class="fu__backdrop" (click)="closeModal()">
    <div class="fu__modal" (click)="$event.stopPropagation()">

      <div class="fu__modal-header">
        <span class="fu__modal-title">{{ label() }}</span>
        <button class="fu__modal-close" type="button" (click)="closeModal()">
          <span class="material-icons">close</span>
        </button>
      </div>

      <label
        class="fu__dropzone"
        [class.fu__dropzone--over]="dragOver()"
        (dragover)="onDragOver($event)"
        (dragleave)="onDragLeave()"
        (drop)="onDrop($event)"
      >
        <input type="file" multiple [attr.accept]="accept()" class="fu__file-input" (change)="onFileSelected($event)" />
        <span class="material-icons fu__dropzone-icon">cloud_upload</span>
        <p class="fu__dropzone-text">
          Drag and drop or <span class="fu__dropzone-link">upload from computer</span>
        </p>
        <p class="fu__dropzone-hint">{{ hint() }}</p>
      </label>

    </div>
  </div>
}
