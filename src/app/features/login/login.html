<div class="login-page">
  <div class="login-card">

    <!-- Logo -->
    <div class="login-card__logo">
      <img src="images/logo.png" alt="Royal Commission for Riyadh City" />
    </div>

    <h2 class="login-card__title">Welcome back</h2>
    <p class="login-card__subtitle">Sign in to your account</p>

    <!-- Error -->
    @if (error()) {
      <div class="login-card__error">
        <span class="material-icons">error_outline</span>
        {{ error() }}
      </div>
    }

    <form class="login-card__form" (ngSubmit)="onSubmit()">

      <!-- Username -->
      <!-- <div class="login-card__field">
        <label class="login-card__label" for="username">Username</label>
        <input
          id="username"
          class="login-card__input"
          type="text"
          placeholder="Enter your username"
          [(ngModel)]="username"
          name="username"
          autocomplete="username"
        />
      </div> -->

      <!-- Password -->
      <!-- <div class="login-card__field">
        <label class="login-card__label" for="password">Password</label>
        <div class="login-card__input-wrap">
          <input
            id="password"
            class="login-card__input"
            [type]="showPassword() ? 'text' : 'password'"
            placeholder="Enter your password"
            [(ngModel)]="password"
            name="password"
            autocomplete="current-password"
          />
          <button
            type="button"
            class="login-card__eye"
            (click)="showPassword.set(!showPassword())"
          >
            <span class="material-icons">{{ showPassword() ? 'visibility_off' : 'visibility' }}</span>
          </button>
        </div>
      </div> -->

      <button type="submit" class="login-card__submit">Sign In with NAFATH</button>

    </form>
  </div>

  <!-- Footer -->
  <footer class="login-footer">
    <div class="login-footer__links">
      <a class="login-footer__link" href="#">terms of use</a>
      <a class="login-footer__link" href="#">privacy policy</a>
      <a class="login-footer__link" href="#">Disclaimer</a>
    </div>

    <div class="login-footer__brand">
      <img src="images/logo.png" alt="RCRC" class="login-footer__brand-logo" />
     
    </div>

    <div class="login-footer__lang">
      <span class="material-icons login-footer__lang-icon">language</span>
      <span class="login-footer__lang-label">Language</span>
      <div class="login-footer__lang-pill">
        <span class="login-footer__lang-pill-text">{{ lang() }}</span>
        <button class="login-footer__lang-pill-arrow" type="button" (click)="toggleLang()">
          <span class="material-icons">{{ langOpen() ? 'expand_less' : 'expand_more' }}</span>
        </button>
        @if (langOpen()) {
          <div class="login-footer__lang-dropdown">
            <button type="button" (click)="setLang('EN')" [class.active]="lang() === 'EN'">EN</button>
            <button type="button" (click)="setLang('AR')" [class.active]="lang() === 'AR'">AR</button>
          </div>
        }
      </div>
    </div>
  </footer>
</div>
